<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anteraja Studio - Professional Sticker Tool</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --magenta: #E2197C; 
            --gold: #FFD25E; 
            --bg: #F3F4F6;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 140px; }

        /* Startup UI */
        .header-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .input-hero { background: #1a1a1a; padding: 25px; border-radius: 20px; color: white; margin-bottom: 20px; }
        .input-hero input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; font-size: 20px; font-weight: 700; color: var(--gold); text-align: center; outline: none; }

        .zone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .zone-card { background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; position: relative; }
        .zone-card input { width: 100%; border: none; border-bottom: 2px solid #eee; padding: 8px 0; font-size: 16px; font-weight: 800; outline: none; }

        /* Navigation Bar */
        .action-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-add { background: #eee; color: #333; }
        .btn-print { background: var(--magenta); color: white; font-size: 16px; box-shadow: 0 8px 20px rgba(226, 25, 124, 0.3); }

        /* STICKER DESIGN (A6 Landscape) */
        .sticker-canvas {
            width: 148mm; height: 105mm; background: var(--magenta);
            position: relative; overflow: hidden; color: white; padding: 10mm;
            display: flex; flex-direction: column;
        }

        /* Logo Utama & Nama Staging Kuning */
        .branding-box {
            position: absolute; top: 8mm; right: 8mm;
            background: white; padding: 8px 15px; border-radius: 10px;
            border: 3px solid var(--magenta); z-index: 100;
            display: flex; flex-direction: column; align-items: center;
        }
        .logo-img { height: 10mm; margin-bottom: 2px; }
        .staging-label { color: var(--magenta); font-weight: 900; font-size: 13px; text-transform: uppercase; background: var(--gold); padding: 2px 8px; border-radius: 4px; }

        /* Mascot Besar (Transparan Belakang) */
        .mascot-bg {
            position: absolute; bottom: -5mm; right: 5mm;
            width: 85mm; height: 85mm; border-radius: 50%;
            overflow: hidden; opacity: 0.4; z-index: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .mascot-bg img { width: 100%; height: 100%; object-fit: cover; }

        .delivery-badge { border: 3px solid white; padding: 5px 25px; border-radius: 50px; font-weight: 900; font-size: 26px; width: fit-content; margin-bottom: 3mm; }
        .unit-title { font-size: 42px; font-weight: 800; margin: 10mm 0 5mm 0; z-index: 10; letter-spacing: -1px; }

        .grid-row { display: flex; gap: 8px; z-index: 10; }
        .grid-cell {
            min-width: 22mm; height: 35mm; background: white; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #111; font-size: 85px; font-weight: 800; padding: 0 5mm;
        }

        /* PRINT SETTINGS */
        #print-container { position: absolute; left: -9999px; }
        .a3-page { width: 297mm; height: 420mm; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); background: white; }
        .print-cell { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h1 style="margin:0; font-weight:800;">Anteraja <span style="color:var(--magenta)">Studio</span></h1>
    </div>

    <div class="input-hero">
        <label style="font-size:11px; opacity:0.6; display:block; margin-bottom:8px;">NAMA STAGING (AUTO-UPDATE)</label>
        <input type="text" id="stg-name" value="BLHR0">
    </div>

    <div id="input-list" class="zone-grid"></div>

    <div class="action-nav">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn btn-add" onclick="addSlot(1)">+ TAMBAH 1</button>
            <button class="btn btn-add" onclick="addSlot(8)">+ TAMBAH 8</button>
        </div>
        <button class="btn btn-print" id="btn-p" onclick="generatePDF()">📥 GENERATE A3 PDF</button>
    </div>
</div>

<div id="print-container"></div>

<script>
    let id = 0;
    function addSlot(n) {
        const list = document.getElementById('input-list');
        for(let i=0; i<n; i++) {
            id++;
            const div = document.createElement('div');
            div.className = 'zone-card';
            div.id = `slot-${id}`;
            div.innerHTML = `
                <button style="position:absolute; top:5px; right:5px; border:none; background:none; color:red; cursor:pointer;" onclick="document.getElementById('slot-${id}').remove()">✕</button>
                <input type="text" class="u-input" placeholder="KODE...">
            `;
            list.appendChild(div);
        }
    }

    function createSticker(staging, code) {
        const div = document.createElement('div');
        div.className = 'sticker-canvas';
        const cells = code.toUpperCase().split('').map(c => `<div class="grid-cell">${c}</div>`).join('');
        
        div.innerHTML = `
            <div class="branding-box">
                <img src="BLHR02.png" class="logo-img">
                <div class="staging-label">${staging}</div>
            </div>
            <div class="mascot-bg"><img src="BLHR01.png"></div>
            <div class="delivery-badge">DELIVERY</div>
            <div style="font-size:10px; font-weight:700; opacity:0.8;">#PASTIBAWAHEPI • #JADIORANGBAIK</div>
            <div class="unit-title">UNIT ZONE</div>
            <div class="grid-row">${cells || '<div class="grid-cell">&nbsp;</div>'}</div>
        `;
        return div;
    }

    async function generatePDF() {
        const staging = document.getElementById('stg-name').value;
        const codes = Array.from(document.querySelectorAll('.u-input')).map(i => i.value).filter(v => v !== "");
        if(codes.length === 0) return alert("Isi kode dulu!");

        const btn = document.getElementById('btn-p');
        btn.innerText = "⏳ PROCESSING...";
        btn.disabled = true;

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a3' });
        const container = document.getElementById('print-container');

        for (let i = 0; i < codes.length; i += 8) {
            container.innerHTML = '';
            const page = document.createElement('div');
            page.className = 'a3-page';
            const chunk = codes.slice(i, i + 8);
            for (let j = 0; j < 8; j++) {
                const cell = document.createElement('div');
                cell.className = 'print-cell';
                if(chunk[j]) cell.appendChild(createSticker(staging, chunk[j]));
                page.appendChild(cell);
            }
            container.appendChild(page);
            const canvas = await html2canvas(page, { scale: 2, useCORS: true });
            if (i > 0) pdf.addPage();
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 420);
        }

        pdf.save(`Sticker_${staging}.pdf`);
        btn.innerText = "📥 GENERATE A3 PDF";
        btn.disabled = false;
        container.innerHTML = '';
    }
    addSlot(8);
</script>
</body>
</html>
