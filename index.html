<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anteraja Studio Pro - Final Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --magenta: #E2197C; --gold: #FFD25E; --ui-bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--ui-bg); margin: 0; padding: 15px; }
        
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 150px; }
        .dashboard-header { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        
        .hero-input { background: #111827; padding: 30px; border-radius: 24px; color: white; margin-bottom: 25px; }
        .hero-input label { display: block; font-size: 11px; font-weight: 700; color: #9ca3af; margin-bottom: 10px; letter-spacing: 1px; }
        .hero-input input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-size: 20px; font-weight: 800; color: var(--gold); text-align: center; outline: none; }

        .zone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .zone-card { background: white; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; position: relative; }
        .zone-card input { width: 100%; border: none; border-bottom: 2px solid #f1f5f9; padding: 8px 0; font-size: 16px; font-weight: 800; outline: none; text-transform: uppercase; }

        /* Floating Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); padding: 20px; border-top: 1px solid #e2e8f0; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 16px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-add { background: #f1f5f9; color: #475569; }
        .btn-print { background: var(--magenta); color: white; box-shadow: 0 10px 25px rgba(226, 25, 124, 0.25); }

        /* =========================================
           STICKER DESIGN (A6 Landscape)
           ========================================= */
        .sticker-canvas {
            width: 148mm; height: 105mm; background: var(--magenta);
            position: relative; overflow: hidden; color: white; padding: 10mm;
            display: flex; flex-direction: column;
        }

        /* Branding Area */
        .branding-group { position: absolute; top: 8mm; right: 8mm; display: flex; flex-direction: column; align-items: flex-end; z-index: 100; }
        .logo-white-box { background: white; padding: 6px 14px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .logo-img { height: 9mm; }
        .staging-name { color: var(--gold); font-weight: 800; font-size: 18px; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        /* Mascot: Background Layer (Paling Belakang) */
        .mascot-layer {
            position: absolute; bottom: -8mm; right: -5mm;
            width: 95mm; height: 95mm; opacity: 0.45; /* Transparansi gambar */
            z-index: 1; /* Di bawah grid-row */
        }
        .mascot-layer img { width: 100%; height: 100%; object-fit: contain; }

        .delivery-pill { border: 3px solid white; padding: 5px 28px; border-radius: 50px; font-weight: 900; font-size: 26px; width: fit-content; margin-bottom: 2mm; position: relative; z-index: 10; }
        .hashtag { color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 1px; position: relative; z-index: 10; }
        
        .unit-zone-title { font-size: 44px; font-weight: 800; margin: 12mm 0 4mm 0; position: relative; z-index: 10; letter-spacing: -1px; }

        /* Kotak Huruf: Solid (Tidak Transparan) */
        .grid-row { display: flex; gap: 8px; position: relative; z-index: 10; }
        .grid-cell {
            min-width: 24mm; height: 36mm; background: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #0f172a; font-size: 88px; font-weight: 800; padding: 0 6mm;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        /* PRINT CONFIG */
        #print-temp { position: absolute; left: -9999px; }
        .a3-page { width: 297mm; height: 420mm; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); background: white; }
        .print-cell { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-header">
        <h1 style="margin:0; font-weight:800; letter-spacing:-1px;">Anteraja <span style="color:var(--magenta)">Studio</span></h1>
        <p style="color:#64748b; font-size:13px; font-weight:600; margin-top:4px;">Sticker Operations Leader Dashboard</p>
    </div>

    <div class="hero-input">
        <label>NAMA STAGING (AUTO-APPLY)</label>
        <input type="text" id="global-stg" value="BLHR0" placeholder="MASUKKAN NAMA STAGING...">
    </div>

    <div id="input-list" class="zone-grid"></div>

    <div class="nav-bar">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <button class="btn btn-add" onclick="addSlot(1)">+ TAMBAH 1</button>
            <button class="btn btn-add" onclick="addSlot(8)">+ TAMBAH 8 (A3)</button>
        </div>
        <button class="btn btn-print" id="btn-gen" onclick="generatePDF()">📥 DOWNLOAD PDF SEMUA HALAMAN</button>
    </div>
</div>

<div id="print-temp"></div>

<script>
    let boxId = 0;
    function addSlot(n) {
        const list = document.getElementById('input-list');
        for(let i=0; i<n; i++) {
            boxId++;
            const div = document.createElement('div');
            div.className = 'zone-card';
            div.id = `item-${boxId}`;
            div.innerHTML = `
                <button style="position:absolute; top:6px; right:6px; border:none; background:none; color:#ef4444; font-weight:bold; cursor:pointer;" onclick="document.getElementById('item-${boxId}').remove()">✕</button>
                <label style="font-size:9px; font-weight:700; color:#94a3b8; display:block; margin-bottom:4px;">SLOT #${boxId}</label>
                <input type="text" class="zone-val" placeholder="KODE...">
            `;
            list.appendChild(div);
        }
    }

    function buildSticker(staging, code) {
        const div = document.createElement('div');
        div.className = 'sticker-canvas';
        const cells = code.toUpperCase().split('').map(c => `<div class="grid-cell">${c}</div>`).join('');
        
        div.innerHTML = `
            <div class="mascot-layer"><img src="BLHR01.png"></div>

            <div class="branding-group">
                <div class="logo-white-box"><img src="BLHR02.png" class="logo-img"></div>
                <div class="staging-name">${staging}</div>
            </div>

            <div class="delivery-pill">DELIVERY</div>
            <div class="hashtag">#PASTIBAWAHEPI • #JADIORANGBAIK</div>

            <div class="unit-zone-title">UNIT ZONE</div>
            <div class="grid-row">${cells || '<div class="grid-cell">&nbsp;</div>'}</div>
        `;
        return div;
    }

    async function generatePDF() {
        const staging = document.getElementById('global-stg').value;
        const codes = Array.from(document.querySelectorAll('.zone-val')).map(i => i.value).filter(v => v !== "");
        if(codes.length === 0) return alert("Silakan isi kode unit zona!");

        const btn = document.getElementById('btn-gen');
        btn.innerText = "⏳ RENDERING HIGH-QUALITY PDF...";
        btn.disabled = true;

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a3' });
        const temp = document.getElementById('print-temp');

        for (let i = 0; i < codes.length; i += 8) {
            temp.innerHTML = '';
            const page = document.createElement('div');
            page.className = 'a3-page';
            const chunk = codes.slice(i, i + 8);
            for (let j = 0; j < 8; j++) {
                const slot = document.createElement('div');
                slot.className = 'print-cell';
                if(chunk[j]) slot.appendChild(buildSticker(staging, chunk[j]));
                page.appendChild(slot);
            }
            temp.appendChild(page);
            const canvas = await html2canvas(page, { scale: 2, useCORS: true });
            if (i > 0) pdf.addPage();
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 420);
        }

        pdf.save(`Stickers_Anteraja_${staging}.pdf`);
        btn.innerText = "📥 DOWNLOAD PDF SEMUA HALAMAN";
        btn.disabled = false;
        temp.innerHTML = '';
    }
    addSlot(8);
</script>
</body>
</html>
