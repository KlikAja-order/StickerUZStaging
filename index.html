<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anteraja Sticker Pro - Layered Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --magenta: #E2197C; --gold: #FFD25E; --ui-bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--ui-bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 140px; }
        
        /* Form Styling */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .staging-box { background: white; border: 2px solid var(--magenta); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .staging-box label { display: block; font-weight: 800; font-size: 11px; color: var(--magenta); margin-bottom: 8px; }
        .staging-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; font-weight: 700; text-align: center; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .input-item { background: white; padding: 12px; border-radius: 10px; border: 1px solid #ddd; position: relative; }
        .input-item input { width: 100%; border: none; border-bottom: 2px solid #eee; padding: 5px 0; font-size: 15px; font-weight: 700; outline: none; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: none; border: none; color: #ff5252; cursor: pointer; }

        /* Navigation Bar */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .btn-add { background: #333; color: white; }
        .btn-print { background: var(--magenta); color: white; box-shadow: 0 8px 20px rgba(226, 25, 124, 0.3); }

        /* =========================================
           STICKER DESIGN (A6 Landscape)
           ========================================= */
        .sticker-canvas {
            width: 148mm; height: 105mm;
            background: var(--magenta);
            position: relative; overflow: hidden; color: white;
            padding: 8mm 10mm; display: flex; flex-direction: column;
        }

        /* Logo Atas: Border & Background Putih */
        .logo-top-container {
            position: absolute; top: 6mm; right: 8mm;
            background: white; padding: 5px 12px; border-radius: 8px;
            border: 2px solid var(--magenta); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-top-img { height: 8mm; }

        /* Logo Kedua (Maskot): Transparan & Circle Crop di Belakang */
        .maskot-bg-circle {
            position: absolute; bottom: 5mm; right: 25mm; /* Posisikan di area kotak 4 & 5 */
            width: 65mm; height: 65mm; border-radius: 50%;
            overflow: hidden; opacity: 0.35; /* Transparansi */
            z-index: 1; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
        }
        .maskot-bg-circle img { width: 110%; height: 110%; object-fit: cover; }

        .sticker-header { display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; margin-bottom: 5mm; }
        .delivery-pill { border: 2.5px solid white; padding: 4px 20px; border-radius: 50px; font-weight: 900; font-size: 22px; }
        .staging-name { font-size: 18px; font-weight: 700; margin-right: 40mm; } /* Jarak agar tidak tabrakan dengan logo */

        .unit-label { font-size: 38px; font-weight: 900; margin: 8mm 0 4mm 0; z-index: 10; letter-spacing: -0.5px; }

        /* Dynamic Grid: Bisa menampung banyak huruf */
        .grid-row { display: flex; gap: 6px; z-index: 10; position: relative; }
        .grid-cell {
            min-width: 20mm; height: 32mm; background: white; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #1a1a1a; font-size: 75px; font-weight: 700; padding: 0 5mm;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* PRINT SETTINGS (A3) */
        #print-container { position: absolute; left: -9999px; }
        .a3-page { width: 297mm; height: 420mm; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); background: white; }
        .print-cell { display: flex; align-items: center; justify-content: center; border: 0.1mm solid #f0f0f0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="text-align:center">
        <h2 style="margin:0; font-weight:900;">STICKER GENERATOR <span style="color:var(--magenta)">ULTRA</span></h2>
    </div>

    <div class="staging-box">
        <label>NAMA STAGING</label>
        <input type="text" id="global-staging" value="BLHR0" placeholder="Contoh: BLHR0">
    </div>

    <div id="input-list" class="input-grid"></div>

    <div class="action-bar">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-add" onclick="addBox(1)">+ TAMBAH 1</button>
            <button class="btn btn-add" style="background:#666" onclick="addBox(8)">+ TAMBAH 8 (1 HALAMAN)</button>
        </div>
        <button class="btn btn-print" id="dl-btn" onclick="generatePDF()">📥 DOWNLOAD PDF A3 (HIGH QUALITY)</button>
    </div>
</div>

<div id="print-container"></div>

<script>
    let count = 0;

    function addBox(n) {
        const list = document.getElementById('input-list');
        for(let i=0; i<n; i++) {
            count++;
            const div = document.createElement('div');
            div.className = 'input-item';
            div.id = `box-${count}`;
            div.innerHTML = `
                <button class="btn-del" onclick="document.getElementById('box-${count}').remove()">✕</button>
                <label>KODE UNIT #${count}</label>
                <input type="text" class="unit-code" placeholder="Kode...">
            `;
            list.appendChild(div);
        }
    }

    function createSticker(staging, code) {
        const div = document.createElement('div');
        div.className = 'sticker-canvas';
        const chars = code.toUpperCase().split('');
        const gridHtml = chars.map(c => `<div class="grid-cell">${c}</div>`).join('');

        div.innerHTML = `
            <div class="logo-top-container">
                <img src="BLHR02.png" class="logo-top-img">
            </div>

            <div class="maskot-bg-circle">
                <img src="BLHR01.png">
            </div>

            <div class="sticker-header">
                <div class="delivery-pill">DELIVERY</div>
                <div class="staging-name">${staging}</div>
            </div>

            <div class="unit-label">UNIT ZONE</div>
            
            <div class="grid-row">
                ${gridHtml || '<div class="grid-cell">&nbsp;</div>'}
            </div>
            
            <div style="font-size:8px; color:var(--gold); font-weight:700; margin-top:auto; z-index:10;">
                #PastiBawaHepi • #JadiOrangBaik
            </div>
        `;
        return div;
    }

    async function generatePDF() {
        const staging = document.getElementById('global-staging').value;
        const codes = Array.from(document.querySelectorAll('.unit-code')).map(i => i.value).filter(v => v !== "");
        
        if(codes.length === 0) return alert("Isi kode Unit Zone!");

        const btn = document.getElementById('dl-btn');
        btn.innerText = "⏳ RENDERING... MOHON TUNGGU";
        btn.disabled = true;

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a3' });
        const container = document.getElementById('print-container');

        for (let i = 0; i < codes.length; i += 8) {
            container.innerHTML = '';
            const page = document.createElement('div');
            page.className = 'a3-page';
            
            const chunk = codes.slice(i, i + 8);
            for (let j = 0; j < 8; j++) {
                const cell = document.createElement('div');
                cell.className = 'print-cell';
                if(chunk[j]) cell.appendChild(createSticker(staging, chunk[j]));
                page.appendChild(cell);
            }
            
            container.appendChild(page);
            const canvas = await html2canvas(page, { scale: 2, useCORS: true });
            
            if (i > 0) pdf.addPage();
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 297, 420);
        }

        pdf.save(`Anteraja_Sticker_${staging}.pdf`);
        btn.innerText = "📥 DOWNLOAD PDF A3 (HIGH QUALITY)";
        btn.disabled = false;
        container.innerHTML = '';
    }

    addBox(8);
</script>
</body>
</html>
